<!doctype html>
<html
  lang="id"
  class="scroll-smooth"
  x-data="{ 
        darkMode: localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches), 
        lang: localStorage.getItem('lang') || 'id' 
      }"
  :class="{ 'dark': darkMode }"
  :lang="lang"
>
  <head>
    <title>Portfolio | Ridho Hidayat</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio Ridho Hidayat, Software Developer spesialis Laravel, Node.js, dan React."
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ridhohidayat.vercel.app/" />
    <meta property="og:title" content="Portfolio | Ridho Hidayat" />
    <meta property="og:description" content="Portfolio Ridho Hidayat, Software Developer spesialis Laravel, Node.js, dan React." />
    <meta property="og:image" content="https://ridhohidayat.vercel.app/img/ridho.jpeg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://ridhohidayat.vercel.app/" />
    <meta property="twitter:title" content="Portfolio | Ridho Hidayat" />
    <meta property="twitter:description" content="Portfolio Ridho Hidayat, Software Developer spesialis Laravel, Node.js, dan React." />
    <meta property="twitter:image" content="https://ridhohidayat.vercel.app/img/ridho.jpeg" />

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              darkBg: "#050505",
              darkCard: "#121212",
            },
          },
        },
      };
    </script>
  </head>
  <body class="antialiased selection:bg-blue-500/30">
    <nav
      class="fixed top-0 left-0 w-full z-50 backdrop-blur-md border-b border-zinc-200 dark:border-zinc-800/50"
    >
      <div
        class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between"
      >
        <div data-aos="fade-right">
          <a
            href="#about"
            class="font-bold text-xl tracking-tight hover:text-blue-500 transition-colors"
            >Ridho.</a
          >
        </div>

        <div
          class="hidden sm:flex gap-8 text-xs font-bold uppercase tracking-widest"
          data-aos="fade-down"
        >
          <a
            href="#about"
            class="hover:text-blue-500 transition"
            x-text="lang === 'id' ? 'Tentang' : 'About'"
          ></a>
          <a
            href="#skill"
            class="hover:text-blue-500 transition"
            x-text="lang === 'id' ? 'Keahlian' : 'Skills'"
          ></a>
          <a
            href="#projects"
            class="hover:text-blue-500 transition"
            x-text="lang === 'id' ? 'Projek' : 'Projects'"
          ></a>
          <a
            href="#contact"
            class="hover:text-blue-500 transition"
            x-text="lang === 'id' ? 'Kontak' : 'Contact'"
          ></a>
        </div>

        <div class="flex items-center gap-3" data-aos="fade-left">
          <button
            aria-label="Ganti Bahasa"
            @click="lang = (lang === 'id' ? 'en' : 'id'); localStorage.setItem('lang', lang)"
            class="w-8 h-8 rounded-full border border-zinc-200 dark:border-zinc-800 flex items-center justify-center text-[10px] font-bold hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all active:scale-90"
          >
            <span x-transition x-text="lang === 'id' ? 'EN' : 'ID'"></span>
          </button>

          <button
            aria-label="Ganti Tema"
            @click="darkMode = !darkMode; localStorage.setItem('theme', darkMode ? 'dark' : 'light')"
            class="w-8 h-8 rounded-full border border-zinc-200 dark:border-zinc-800 flex items-center justify-center hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all active:scale-90"
          >
            <i
              class="fa-solid transition-transform duration-500"
              :class="darkMode ? 'fa-sun text-yellow-400 rotate-180' : 'fa-moon text-blue-600'"
            ></i>
          </button>
        </div>
      </div>
    </nav>

    <div class="max-w-4xl mx-auto px-6 py-24">
      <header
        id="about"
        class="mb-24 pt-10 flex flex-col-reverse items-center text-center sm:items-start sm:text-left sm:flex-row gap-8 sm:gap-12"
      >
        <div class="flex-1 space-y-6" data-aos="fade-up" data-aos-delay="100">
          <div>
            <h2
              class="text-blue-500 font-medium mb-2 tracking-wide text-sm uppercase"
              x-text="lang === 'id' ? 'Hallo, Saya' : 'Hello, I am'"
            >
            </h2>
            <h1
              class="text-4xl sm:text-5xl font-bold tracking-tight mb-4 dark:text-white"
            >
              Ridho Hidayat
            </h1>
            <p
              class="text-zinc-600 dark:text-zinc-400 text-lg leading-relaxed max-w-lg"
              x-show="true"
              x-transition:enter="transition ease-out duration-300"
              x-transition:enter-start="opacity-0"
              x-transition:enter-end="opacity-100"
              x-text="lang === 'id' ? 'Software Developer. Suka membangun produk digital yang simpel, cepat, dan fungsional.' : 'Software Engineer. I love building simple, fast, and functional digital products.'"
            ></p>
          </div>

          <div
            class="flex flex-wrap gap-4 justify-center sm:justify-start text-zinc-500"
          >
            <a
              href="#contact"
              class="px-6 py-2.5 bg-zinc-900 dark:bg-white text-white dark:text-black rounded-full text-sm font-semibold hover:opacity-90 transition-all hover:shadow-lg active:scale-95"
            >
              <span
                x-text="lang === 'id' ? 'Hubungi Saya' : 'Contact Me'"
              ></span>
            </a>
            <a
              href="document/CV-RidhoHidayat.pdf"
              target="_blank"
              rel="noopener noreferrer"
              class="px-6 py-2.5 border border-zinc-200 dark:border-zinc-700 rounded-full text-sm font-semibold hover:border-blue-500 hover:text-blue-500 transition-all active:scale-95"
            >
              <span
                x-text="lang === 'id' ? 'Lihat CV' : 'View CV'"
              ></span>
            </a>
          </div>

          <div
            class="flex gap-5 justify-center sm:justify-start text-xl text-zinc-400 pt-2"
          >
            <a
              href="https://github.com/rdhohdyat"
              aria-label="Kunjungi Profil GitHub Saya"
              target="_blank"
              rel="noopener noreferrer"
              class="hover:text-white transition-all hover:-translate-y-1"
              ><i class="fa-brands fa-github"></i
            ></a>
            <a
              href="https://www.linkedin.com/in/rdhohdyat/"
              target="_blank"
              rel="noopener noreferrer"
              class="hover:text-blue-500 transition-all hover:-translate-y-1"
              ><i class="fa-brands fa-linkedin"></i
            ></a>
            <a
              href="https://www.youtube.com/@ridhoohidayat"
              target="_blank"
              rel="noopener noreferrer"
              class="hover:text-red-500 transition-all hover:-translate-y-1"
              ><i class="fa-brands fa-youtube"></i
            ></a>
            <a
              href="https://www.instagram.com/rdho.hdyat/"
              target="_blank"
              rel="noopener noreferrer"
              class="hover:text-pink-500 transition-all hover:-translate-y-1"
              ><i class="fa-brands fa-instagram"></i
            ></a>
          </div>
        </div>

        <div class="relative group" data-aos="zoom-in" data-aos-delay="300">
          <div
            class="absolute -inset-1 rounded-2xl  blur opacity-25 group-hover:opacity-50 transition duration-1000"
          ></div>
          <div
            class="relative w-64 h-64 rounded-2xl border-2 border-zinc-200 dark:border-zinc-800 bg-zinc-100 dark:bg-zinc-900 overflow-hidden"
          >
            <img
              src="img/ridho.jpeg"
              alt="Foto profil Ridho Hidayat - Software Developer"
              class="w-full h-full object-cover transition duration-700 group-hover:scale-110"
              loading="lazy"
            />
          </div>
        </div>
      </header>

      <main class="space-y-24">
        <section data-aos="fade-up">
          <div class="flex items-center gap-4 mb-8">
            <h2
              class="text-xs font-bold uppercase tracking-widest text-zinc-500"
              x-text="lang === 'id' ? 'Tentang Saya' : 'About Me'"
            ></h2>
            <div class="h-px flex-1 bg-zinc-200 dark:bg-zinc-800/50"></div>
          </div>
          <div
            class="prose dark:prose-invert text-zinc-600 dark:text-zinc-400 leading-relaxed"
          >
            <p
              x-text="lang === 'id' ? 'Saya adalah pengembang web dan aplikasi mobile yang terbiasa membangun solusi digital yang fungsional. Saya fokus pada pengembangan aplikasi yang efisien, mudah dipelihara, dan berpusat pada pengalaman pengguna.' : 'I am a web and mobile developer dedicated to building functional digital solutions. I focus on creating efficient, maintainable applications with a strong emphasis on user experience.'"
            ></p>
            <p
              class="mt-4"
              x-text="lang === 'id' ? 'Keahlian teknis saya meliputi Laravel, Node.js, dan React.js untuk pengembangan web, serta pengembangan aplikasi mobile yang responsif.' : 'My technical expertise spans across Laravel, Node.js, and React.js for web development, along with responsive mobile application development.'"
            ></p>
          </div>
        </section>

        <section id="skill">
          <div class="flex items-center gap-4 mb-8" data-aos="fade-up">
            <h2
              class="text-xs font-bold uppercase tracking-widest text-zinc-500"
              x-text="lang === 'id' ? 'Keahlian Teknis' : 'Technical Skills'"
            ></h2>
            <div class="h-px flex-1 bg-zinc-200 dark:bg-zinc-800/50"></div>
          </div>

          <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4">
            <template
              x-for="(tech, index) in ['JavaScript', 'React', 'Node.js', 'TypeScript', 'Next.js', 'Tailwind CSS', 'PHP', 'Laravel', 'Livewire', 'Python', 'MySQL', 'Vite.js', 'Docker', 'Git', 'Alpine.js']"
            >
              <div
                class="bento-card p-4 rounded-xl flex flex-col items-center justify-center gap-3 group cursor-default"
                data-aos="zoom-in"
                :data-aos-delay="index * 50"
              >
                <div class="h-10 w-10 flex items-center justify-center">
                  <img
                    :src="`img/tech-stack/${tech}.png`"
                    :alt="tech"
                    class="tech-icon max-h-full max-w-full object-contain"
                    loading="lazy"
                    onerror="
                      this.style.display = 'none';
                      this.nextElementSibling.style.display = 'block';
                    "
                  />
                </div>
                <span
                  class="text-[10px] font-bold uppercase tracking-wider text-zinc-500 group-hover:text-zinc-800 dark:group-hover:text-zinc-200 transition-colors"
                  x-text="tech"
                ></span>
              </div>
            </template>
          </div>
        </section>

        <section id="experience" class="py-12">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
            <div class="md:col-span-1" data-aos="fade-right">
              <div class="sticky top-24">
                <div class="flex items-center gap-4 mb-6">
                  <h2
                    class="text-xs font-bold uppercase tracking-widest text-zinc-500"
                    x-text="lang === 'id' ? 'Pengalaman' : 'Experience'"
                  ></h2>
                  <div
                    class="h-px flex-1 bg-zinc-200 dark:bg-zinc-800/50 sm:hidden"
                  ></div>
                </div>
                <h3
                  class="text-3xl font-bold mb-4 dark:text-white"
                  x-text="lang === 'id' ? 'Riwayat Karir' : 'My Experience'"
                ></h3>
                <p
                  class="text-zinc-500 dark:text-zinc-400 text-sm leading-relaxed mb-8"
                  x-text="lang === 'id' ? 'Saya telah bekerja di berbagai instansi untuk mengasah kemampuan pengembangan web dan solusi digital.' : 'I have worked with various institutions to hone my web development and digital solution skills.'"
                ></p>
              </div>
            </div>

            <div
              class="md:col-span-2 relative border-l border-zinc-200 dark:border-zinc-800 ml-4 md:ml-0 pl-8 space-y-12"
            >
              <div class="relative group" data-aos="fade-up">
                <div
                  class="absolute -left-[40px] top-1.5 w-4 h-4 rounded-full bg-amber-500 border-4 border-white dark:border-darkBg group-hover:scale-125 transition-transform"
                ></div>
                <div
                  class="flex flex-col sm:flex-row sm:items-center justify-between mb-2"
                >
                  <h4 class="text-lg font-bold dark:text-white">
                    Freelance Web Developer
                  </h4>
                  <span
                    class="text-xs font-bold text-zinc-400 uppercase tracking-wider"
                    >Jan 2025 — Present</span
                  >
                </div>
                <p class="text-blue-500 font-medium text-sm mb-3">Jokiin Aja</p>
                <p
                  class="text-zinc-500 dark:text-zinc-400 text-sm leading-relaxed"
                  x-text="lang === 'id' ? 'Bertanggung jawab dalam membangun landing page dan sistem web kustom sesuai permintaan klien menggunakan stack Laravel dan Tailwind CSS.' : 'Responsible for building landing pages and custom web systems according to client requests using Laravel and Tailwind CSS stack.'"
                ></p>
              </div>

              <div
                class="relative group"
                data-aos="fade-up"
                data-aos-delay="100"
              >
                <div
                  class="absolute -left-[40px] top-1.5 w-4 h-4 rounded-full bg-zinc-300 dark:bg-zinc-700 border-4 border-white dark:border-darkBg group-hover:bg-amber-500 transition-all group-hover:scale-125"
                ></div>
                <div
                  class="flex flex-col sm:flex-row sm:items-center justify-between mb-2"
                >
                  <h4 class="text-lg font-bold dark:text-white">
                    Web Developer Intern
                  </h4>
                  <span
                    class="text-xs font-bold text-zinc-400 uppercase tracking-wider"
                    >Aug 2025 — Jan 2026</span
                  >
                </div>
                <p class="text-blue-500 font-medium text-sm mb-3">
                  RS Bakti Timah Medika Pangkal Pinang
                </p>
                <p
                  class="text-zinc-500 dark:text-zinc-400 text-sm leading-relaxed"
                  x-text="lang === 'id' ? 'Membantu pengembangan sistem internal rumah sakit, mengoptimalkan database, dan memastikan antarmuka pengguna responsif dan mudah digunakan oleh staf medis.' : 'Assisting in the development of internal hospital systems, optimizing databases, and ensuring the user interface is responsive and easy to use by medical staff.'"
                ></p>
              </div>
            </div>
          </div>
        </section>

        <section id="projects" x-data="{ 
          projects: [], 
          showAll: false,
          modalOpen: false,
          selectedProject: null,
          openModal(project) {
            this.selectedProject = project;
            this.modalOpen = true;
            document.body.style.overflow = 'hidden';
          },
          closeModal() {
            this.modalOpen = false;
            document.body.style.overflow = 'auto';
          }
        }" x-init="fetch('assets/data/projects.json').then(r => r.json()).then(d => projects = d)">
          <div class="flex items-center gap-4 mb-8" data-aos="fade-up">
            <h2
              class="text-xs font-bold uppercase tracking-widest text-zinc-500"
              x-text="lang === 'id' ? 'Projek Pilihan' : 'Selected Work'"
            ></h2>
            <div class="h-px flex-1 bg-zinc-200 dark:bg-zinc-800/50"></div>
          </div>

          <div class="grid md:grid-cols-2 gap-4">
            <template x-for="(project, index) in (showAll ? projects : projects.slice(0, 4))" :key="index">
              <div
                @click="openModal(project)"
                class="bento-card p-6 rounded-3xl flex flex-col gap-4 group relative overflow-hidden cursor-pointer"
                data-aos="fade-up"
                :data-aos-delay="project.delay"
              >
                <div class="z-10">
                  <h3
                    class="text-lg font-bold mb-1 group-hover:text-blue-500 transition-colors"
                    x-text="project.title"
                  ></h3>
                  <p
                    class="text-sm text-zinc-500 dark:text-zinc-400 leading-relaxed line-clamp-2"
                    x-text="lang === 'id' ? project.description_id : project.description_en"
                  ></p>
                </div>
                <div class="flex flex-wrap gap-2 mt-auto z-10">
                  <template x-for="tag in project.tags">
                    <span
                      class="text-[10px] px-2 py-1 rounded bg-zinc-100 dark:bg-zinc-800 text-zinc-500 border border-zinc-200 dark:border-zinc-700"
                      x-text="tag"
                    ></span>
                  </template>
                </div>
              </div>
            </template>
          </div>

          <!-- Sea All Button -->
          <div class="mt-12 flex justify-center" data-aos="fade-up" x-show="projects.length > 4">
            <button 
              @click="showAll = !showAll"
              class="px-8 py-3 rounded-full border border-zinc-200 dark:border-zinc-800 font-bold text-xs uppercase tracking-widest hover:border-blue-500 hover:text-blue-500 transition-all active:scale-95 flex items-center gap-2"
            >
              <span x-text="showAll ? (lang === 'id' ? 'Tampilkan Lebih Sedikit' : 'Show Less') : (lang === 'id' ? 'Lihat Semua Projek' : 'See All Projects')"></span>
              <i class="fa-solid transition-transform duration-300" :class="showAll ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
            </button>
          </div>
          <!-- Project Modal -->
          <template x-teleport="body">
            <div 
              x-show="modalOpen" 
              class="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6"
              x-transition:enter="transition ease-out duration-300"
              x-transition:enter-start="opacity-0"
              x-transition:enter-end="opacity-100"
              x-transition:leave="transition ease-in duration-200"
              x-transition:leave-start="opacity-100"
              x-transition:leave-end="opacity-0"
            >
              <!-- Backdrop -->
              <div 
                class="absolute inset-0 bg-zinc-950/80 backdrop-blur-sm"
                @click="closeModal()"
              ></div>

              <!-- Modal Content -->
              <div 
                x-show="modalOpen"
                @click.stop
                class="relative w-full max-w-3xl max-h-[90vh] bg-white dark:bg-zinc-900 rounded-3xl shadow-2xl overflow-hidden flex flex-col"
                x-transition:enter="transition ease-out duration-300"
                x-transition:enter-start="opacity-0 scale-95 translate-y-4"
                x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                x-transition:leave="transition ease-in duration-200"
                x-transition:leave-start="opacity-100 scale-100 translate-y-0"
                x-transition:leave-end="opacity-0 scale-95 translate-y-4"
              >
                <!-- Close Button -->
                <button 
                  @click="closeModal()"
                  class="absolute top-4 right-4 z-20 w-10 h-10 rounded-full bg-black/20 hover:bg-black/40 text-white backdrop-blur-md flex items-center justify-center transition-all active:scale-95"
                >
                  <i class="fa-solid fa-xmark"></i>
                </button>

                <!-- Scrollable Body -->
                <div class="overflow-y-auto custom-scrollbar">
                  <!-- Project Image Container -->
                  <div class="relative w-full aspect-video sm:aspect-[21/9]">
                    <img 
                      :src="selectedProject?.image" 
                      :alt="selectedProject?.title"
                      class="w-full h-full object-cover"
                    />
                    <div class="absolute inset-0 bg-gradient-to-t from-zinc-900 to-transparent"></div>
                    
                    <div class="absolute bottom-6 left-6 right-6">
                      <div class="flex flex-wrap gap-2 mb-3">
                        <template x-for="tag in selectedProject?.tags">
                          <span class="text-[9px] font-bold uppercase tracking-widest px-2 py-1 rounded bg-blue-500 text-white" x-text="tag"></span>
                        </template>
                      </div>
                      <h3 class="text-2xl sm:text-3xl font-bold text-white" x-text="selectedProject?.title"></h3>
                    </div>
                  </div>

                  <!-- Details -->
                  <div class="p-6 sm:p-8 space-y-6">
                    <div>
                      <h4 class="text-xs font-bold uppercase tracking-widest text-zinc-500 mb-3" x-text="lang === 'id' ? 'Tentang Projek' : 'About Project'"></h4>
                      <p 
                        class="text-zinc-600 dark:text-zinc-400 leading-relaxed text-sm sm:text-base whitespace-pre-line"
                        x-text="lang === 'id' ? selectedProject?.description_id : selectedProject?.description_en"
                      ></p>
                    </div>

                    <div class="pt-4 flex flex-wrap gap-4">
                      <a 
                        :href="selectedProject?.link" 
                        target="_blank"
                        class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-full text-sm font-bold transition-all active:scale-95 flex items-center gap-2"
                        x-show="selectedProject?.link !== '#projects'"
                      >
                        <span x-text="lang === 'id' ? 'Kunjungi Situs' : 'Visit Site'"></span>
                        <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
                      </a>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </section>

        <section id="contact" class="py-12" data-aos="fade-up">
          <div class="flex items-center gap-4 mb-10">
            <h2
              class="text-xs font-bold uppercase tracking-widest text-zinc-500"
              x-text="lang === 'id' ? 'Mari Terhubung' : 'Let\'s Connect'"
            ></h2>
            <div class="h-px flex-1 bg-zinc-200 dark:bg-zinc-800/50"></div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
            <div class="space-y-6">
              <h3
                class="text-3xl font-bold dark:text-white"
                x-text="lang === 'id' ? 'Punya ide proyek?' : 'Have a project idea?'"
              ></h3>
              <p class="text-zinc-500 dark:text-zinc-400 leading-relaxed">
                <span
                  x-text="lang === 'id' ? 'Jika Anda memiliki pertanyaan, proposal proyek, atau sekadar ingin menyapa, silakan hubungi saya! Saya akan membalas Anda sesegera mungkin.' : 'If you have any questions, project proposals, or just want to say hello, feel free to reach out! I\'ll get back to you as soon as possible.'"
                ></span>
              </p>
              <div class="pt-4 space-y-4">
                <div class="flex items-center gap-4 group cursor-pointer">
                  <div
                    class="w-10 h-10 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-500 group-hover:scale-110 group-hover:bg-blue-500 group-hover:text-white transition-all"
                  >
                    <i class="fa-solid fa-envelope"></i>
                  </div>
                  <div>
                    <p
                      class="text-[10px] uppercase tracking-widest text-zinc-400 font-bold"
                    >
                      Email
                    </p>
                    <a
                      href="mailto:rdho.hdyat@gmail.com"
                      class="text-sm font-medium dark:text-zinc-200 hover:text-blue-500 transition-colors"

            <form 
              x-data="{ 
                loading: false, 
                success: false, 
                error: false,
                async submitForm() {
                  this.loading = true;
                  this.success = false;
                  this.error = false;
                  
                  try {
                    const response = await fetch(this.$el.action, {
                      method: 'POST',
                      body: new FormData(this.$el),
                      headers: {
                        'Accept': 'application/json'
                      }
                    });
                    
                    if (response.ok) {
                      this.success = true;
                      this.$el.reset();
                      setTimeout(() => this.success = false, 5000);
                    } else {
                      this.error = true;
                      setTimeout(() => this.error = false, 5000);
                    }
                  } catch (e) {
                    this.error = true;
                    setTimeout(() => this.error = false, 5000);
                  } finally {
                    this.loading = false;
                  }
                }
              }" 
              @submit.prevent="submitForm()"
              action="https://formspree.io/f/mreawbre"
